name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

permissions: {}

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.4"
      - name: Install dependencies
        run: uv sync --all-packages
        working-directory: backend
      - name: Run ruff
        run: uv run ruff check .
        working-directory: backend
      - name: Run ruff format check
        run: uv run ruff format --check .
        working-directory: backend

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
        working-directory: frontend
      - name: Run biome
        run: bun run lint
        working-directory: frontend

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.4"
      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          PROJECT_NAME=Blog CI
          DOMAIN=localhost
          STACK_NAME=ci
          ENVIRONMENT=local
          FRONTEND_HOST=http://localhost:5173
          BACKEND_CORS_ORIGINS=http://localhost,http://localhost:5173

          SECRET_KEY=changethis
          FIRST_SUPERUSER=admin@example.com
          FIRST_SUPERUSER_PASSWORD=changethis

          # localhost, not 'db': prestart.sh and pytest run via uv on the
          # bare runner here, not inside a container, so they reach Postgres
          # through the published port from compose.override.yml, not
          # Docker's internal network DNS.
          POSTGRES_SERVER=localhost
          POSTGRES_PORT=5432
          POSTGRES_DB=app
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=changethis

          SMTP_HOST=
          SMTP_USER=
          SMTP_PASSWORD=
          EMAILS_FROM_EMAIL=noreply@example.com

          SENTRY_DSN=

          DOCKER_IMAGE_BACKEND=backend
          DOCKER_IMAGE_FRONTEND=frontend
          TAG=latest
          EOF
      - run: docker compose down -v --remove-orphans
      - run: docker compose up -d db mailcatcher
      - name: Wait for DB
        run: sleep 5
      - name: Run migrations
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run bash scripts/tests-start.sh "CI ${{ github.sha }}"
        working-directory: backend
      - run: docker compose down -v --remove-orphans
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: backend/htmlcov
          retention-days: 7

  smoke-test:
    name: Smoke Test (Docker Compose)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          PROJECT_NAME=Blog CI
          DOMAIN=localhost
          STACK_NAME=ci
          ENVIRONMENT=local
          FRONTEND_HOST=http://localhost:5173
          BACKEND_CORS_ORIGINS=http://localhost,http://localhost:5173

          SECRET_KEY=changethis
          FIRST_SUPERUSER=admin@example.com
          FIRST_SUPERUSER_PASSWORD=changethis

          POSTGRES_SERVER=db
          POSTGRES_PORT=5432
          POSTGRES_DB=app
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=changethis

          SMTP_HOST=
          SMTP_USER=
          SMTP_PASSWORD=
          EMAILS_FROM_EMAIL=noreply@example.com

          SENTRY_DSN=

          DOCKER_IMAGE_BACKEND=backend
          DOCKER_IMAGE_FRONTEND=frontend
          TAG=latest
          EOF
      # -f compose.yml -f compose.ci.yml deliberately excludes
      # compose.override.yml: that file is dev-only (runs frontend as a
      # live bun dev server via volume mount) and would otherwise get
      # auto-merged here, which both defeats the point of a production
      # smoke test and corrupts the oven/bun image tag during `build`.
      - run: docker compose -f compose.yml -f compose.ci.yml build
      - run: docker compose -f compose.yml -f compose.ci.yml down -v --remove-orphans
      - name: Create external traefik-public network
        run: docker network create traefik-public || true
      - run: docker compose -f compose.yml -f compose.ci.yml up -d --wait backend frontend
      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::frontend logs"
          docker compose -f compose.yml -f compose.ci.yml logs frontend
          echo "::endgroup::"
          echo "::group::backend logs"
          docker compose -f compose.yml -f compose.ci.yml logs backend
          echo "::endgroup::"
      - name: Health check backend
        run: curl -f http://localhost:8000/api/v1/utils/health-check/
      - name: Health check frontend
        run: curl -f http://localhost:5173
      - run: docker compose -f compose.yml -f compose.ci.yml down -v --remove-orphans
